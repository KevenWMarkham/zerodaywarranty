repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^src/.*\.py$
        additional_dependencies: [pydantic>=2.7.0, types-PyYAML>=6.0]

  - repo: local
    hooks:
      - id: zdw-validate
        name: zdw validate (manifests + audit chain)
        entry: python zdw.py validate
        language: system
        pass_filenames: false
        files: ^(service/|src/|catalog/).*
