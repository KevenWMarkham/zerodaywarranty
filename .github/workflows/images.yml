name: Build images (GHCR)

# Builds the three container images on GitHub's runners and pushes them to GitHub
# Container Registry (ghcr.io). For a PRIVATE Azure Container Registry you can't
# push from a public shell, so the flow is:
#   1) run this workflow  -> images land in ghcr.io/<owner>/zdw-*
#   2) az acr import them server-side into the private ACR (see infra/README.md)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag
        required: true
        default: "0.1.0"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [orchestrator, mcp-warranty, mcp-ledger]
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        id: vars
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: ghcr.io/${{ steps.vars.outputs.owner }}/zdw-${{ matrix.target }}:${{ github.event.inputs.image_tag }}
