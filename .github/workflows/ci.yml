name: CI

# Lint, type-check, test, and validate the design artifacts on every push/PR.
# Closes Experts-Panel gap #3 (no CI). The deploy pipeline (gap #5) is tracked
# separately as backlog story S4-5.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pydantic pyyaml pytest pytest-cov ruff mypy types-PyYAML
          pip install -e .

      - name: Ruff (lint)
        run: ruff check .

      - name: Ruff (format check)
        run: ruff format --check src tests conftest.py zdw.py

      - name: Mypy (type check)
        run: mypy src

      - name: Pytest
        run: pytest -q

      - name: Validate manifests + audit chain
        run: python zdw.py validate

      - name: Roadmap + deployment checklist
        # Render the board; do not fail CI on open deploy gates (design stage).
        run: |
          python zdw.py roadmap
          python zdw.py checklist || true
